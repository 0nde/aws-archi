name: Finalize a release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Existing image/tag version without the v prefix (for example 1.0.3)
        required: true
        type: string

concurrency:
  group: release-assistant
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  finalize:
    name: Propose release metadata and devcontainer digest
    if: github.repository == '0nde/aws-archi' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: maintenance
    env:
      GH_TOKEN: ${{ secrets.MAINTENANCE_TOKEN }}
      IMAGE: ghcr.io/0nde/aws-archi
      IMAGE_DOCKERHUB: haonde/aws-archi
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Read pinned tool versions
        id: versions
        run: |
          source tooling/tool-versions.conf
          echo "cosign=${COSIGN_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v${{ steps.versions.outputs.cosign }}
      - name: Validate the signed release candidate
        run: |
          python scripts/verify_release_candidate.py \
            --version "$VERSION" \
            --repository "$GITHUB_REPOSITORY" \
            --canonical-image "$IMAGE" \
            --mirror-image "$IMAGE_DOCKERHUB" \
            --github-env "$GITHUB_ENV"
      - name: Pin the released canonical image
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          for path in (
              Path(".devcontainer/devcontainer.json"),
              Path(".devcontainer/docker/devcontainer.json"),
          ):
              document = json.loads(path.read_text(encoding="utf-8"))
              document["image"] = f"ghcr.io/0nde/aws-archi@{os.environ['DIGEST']}"
              path.write_text(json.dumps(document, indent=2) + "\n", encoding="utf-8")
          PY
      - id: changes
        name: Create or refresh the release pull request
        env:
          BRANCH: release/v${{ inputs.version }}
        run: |
          if git diff --quiet -- .devcontainer/devcontainer.json .devcontainer/docker/devcontainer.json; then
            echo "The devcontainer already pins ${DIGEST}." >> "$GITHUB_STEP_SUMMARY"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "aws-archi release assistant"
          git config user.email "3944130+0nde@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add .devcontainer/devcontainer.json .devcontainer/docker/devcontainer.json
          git diff --cached --check
          git commit -m "chore: pin ${TAG} devcontainer image"
          gh auth setup-git
          remote_sha=$(git ls-remote --heads origin "$BRANCH" | awk '{print $1}')
          if [ -n "$remote_sha" ]; then
            git push --force-with-lease="refs/heads/${BRANCH}:${remote_sha}" \
              --set-upstream origin "$BRANCH"
          else
            git push --set-upstream origin "$BRANCH"
          fi

          cat > "$RUNNER_TEMP/release-pr.md" <<EOF
          Pins the Dev Container to the verified canonical GHCR image for **${TAG}**:

          \`${IMAGE}@${DIGEST}\`

          This pull request was prepared automatically and will not be merged automatically.
          EOF

          number=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$number" ]; then
            gh pr edit "$number" --title "chore: pin ${TAG} devcontainer image" --body-file "$RUNNER_TEMP/release-pr.md"
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: pin ${TAG} devcontainer image" \
              --body-file "$RUNNER_TEMP/release-pr.md"
          fi
          cat "$RUNNER_TEMP/release-pr.md" >> "$GITHUB_STEP_SUMMARY"
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Create a human-reviewed draft GitHub release
        run: |
          if gh release view "$TAG" --json isDraft --jq '.isDraft' >/dev/null 2>&1; then
            echo "A GitHub release already exists for ${TAG}; it was left unchanged." >> "$GITHUB_STEP_SUMMARY"
          else
            gh release create "$TAG" \
              --verify-tag \
              --draft \
              --generate-notes \
              --title "$TAG"
            echo "A draft GitHub release was generated. Review it before publishing." >> "$GITHUB_STEP_SUMMARY"
          fi
