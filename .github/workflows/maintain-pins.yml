name: Maintain pinned tools

on:
  schedule:
    - cron: "37 5 * * 6"
  workflow_dispatch:

concurrency:
  group: maintain-pinned-tools
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update:
    name: Prepare pinned tool updates
    if: github.repository == '0nde/aws-archi'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: maintenance
    env:
      GH_TOKEN: ${{ secrets.MAINTENANCE_TOKEN }}
      BRANCH: bot/pinned-tool-updates
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Require the dedicated maintenance identity
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Configure the MAINTENANCE_TOKEN secret in the protected maintenance environment as documented in .github/MAINTENANCE.md" >&2
            exit 1
          fi
      - name: Test the maintenance updater
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Update manually managed pins
        run: python scripts/update-pins.py --summary "$RUNNER_TEMP/maintenance-summary.md"
      - id: changes
        name: Detect source changes
        run: |
          if [ -n "$(git status --porcelain -- .devcontainer/Dockerfile THIRD_PARTY_NOTICES.md third_party_licenses)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            cat "$RUNNER_TEMP/maintenance-summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Commit update branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "aws-archi maintenance"
          git config user.email "3944130+0nde@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add .devcontainer/Dockerfile THIRD_PARTY_NOTICES.md third_party_licenses
          git diff --cached --check
          git commit -m "chore: update pinned tools"
          gh auth setup-git
          git push --force --set-upstream origin "$BRANCH"
      - name: Open or refresh maintenance pull request
        if: steps.changes.outputs.changed == 'true'
        run: |
          {
            cat "$RUNNER_TEMP/maintenance-summary.md"
            printf '\n%s\n\n%s\n' \
              "This pull request was prepared automatically but will not be merged automatically." \
              "Review the upstream releases and checksum changes, then wait for CodeQL, AMD64, ARM64 and Trivy validation before merging."
          } > "$RUNNER_TEMP/pull-request.md"

          number=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$number" ]; then
            gh pr edit "$number" --title "chore: update pinned tools" --body-file "$RUNNER_TEMP/pull-request.md"
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: update pinned tools" \
              --body-file "$RUNNER_TEMP/pull-request.md" \
              --label dependencies \
              --label security
          fi
          cat "$RUNNER_TEMP/pull-request.md" >> "$GITHUB_STEP_SUMMARY"
