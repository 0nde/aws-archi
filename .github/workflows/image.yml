name: Build and publish image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - ".devcontainer/Dockerfile"
      - ".dockerignore"
      - "scripts/**"
      - "tooling/**"
      - "third_party_licenses/**"
      - "LICENSE"
      - "NOTICE"
      - "THIRD_PARTY_NOTICES.md"
      - "SOURCE_OFFER.md"
  pull_request:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_DOCKERHUB: haonde/aws-archi
  IMAGE_GHCR: ghcr.io/0nde/aws-archi

jobs:
  validate:
    name: Validate image (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build validation image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: .devcontainer/Dockerfile
          platforms: ${{ matrix.platform }}
          load: true
          push: false
          tags: aws-archi:test
          cache-from: type=gha,scope=aws-archi-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=aws-archi-${{ matrix.arch }}
      - name: Verify tools and runtime defaults
        run: docker run --rm -v "$PWD/scripts:/tests:ro" aws-archi:test bash /tests/verify-tools.sh
      - name: Block fixable critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: aws-archi:test
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

  publish-platform:
    name: Publish platform (${{ matrix.arch }})
    if: github.event_name != 'pull_request'
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        name: Build and push platform by digest
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: .devcontainer/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=${{ env.IMAGE_DOCKERHUB }},${{ env.IMAGE_GHCR }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=aws-archi-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=aws-archi-${{ matrix.arch }}
          sbom: true
          provenance: mode=max
      - name: Export platform digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - name: Upload platform digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-manifest:
    name: Publish multi-architecture manifest
    if: github.event_name != 'pull_request'
    needs: publish-platform
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ${{ env.IMAGE_DOCKERHUB }}
            ${{ env.IMAGE_GHCR }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
      - id: manifest
        name: Create multi-architecture manifest
        env:
          FINAL_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          mapfile -t digests < <(find /tmp/digests -maxdepth 1 -type f -printf '%f\n' | sort)
          if [ "${#digests[@]}" -ne 2 ]; then
            echo "Expected two platform digests, found ${#digests[@]}" >&2
            exit 1
          fi

          sources=()
          for digest in "${digests[@]}"; do
            sources+=("${IMAGE_DOCKERHUB}@sha256:${digest}")
          done

          tag_args=()
          dockerhub_ref=""
          ghcr_ref=""
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            tag_args+=(--tag "$tag")
            case "$tag" in
              "${IMAGE_DOCKERHUB}:"*) [ -n "$dockerhub_ref" ] || dockerhub_ref="$tag" ;;
              "${IMAGE_GHCR}:"*) [ -n "$ghcr_ref" ] || ghcr_ref="$tag" ;;
            esac
          done <<< "$FINAL_TAGS"

          if [ -z "$dockerhub_ref" ] || [ -z "$ghcr_ref" ]; then
            echo "Metadata did not produce tags for both registries" >&2
            exit 1
          fi

          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"
          echo "dockerhub_ref=$dockerhub_ref" >> "$GITHUB_OUTPUT"
          echo "ghcr_ref=$ghcr_ref" >> "$GITHUB_OUTPUT"
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1
      - name: Sign image manifests with GitHub OIDC
        env:
          DOCKERHUB_REF: ${{ steps.manifest.outputs.dockerhub_ref }}
          GHCR_REF: ${{ steps.manifest.outputs.ghcr_ref }}
        run: |
          cosign sign --yes "$DOCKERHUB_REF"
          cosign sign --yes "$GHCR_REF"
      - name: Synchronize Docker Hub overview
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: haonde/aws-archi
          readme-filepath: ./DOCKER_HUB_OVERVIEW.md
          short-description: Multi-architecture AWS and Infrastructure as Code development container
