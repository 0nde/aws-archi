name: Build and publish image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - ".devcontainer/Dockerfile"
      - ".dockerignore"
      - "scripts/**"
      - "tooling/**"
      - "third_party_licenses/**"
      - "LICENSE"
      - "NOTICE"
      - "THIRD_PARTY_NOTICES.md"
      - "SOURCE_OFFER.md"
  pull_request:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_DOCKERHUB: haonde/aws-archi
  IMAGE_GHCR: ghcr.io/0nde/aws-archi

jobs:
  validate:
    name: Validate image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build validation image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: .devcontainer/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: aws-archi:test
          cache-from: type=gha,scope=aws-archi
          cache-to: type=gha,mode=max,scope=aws-archi
      - name: Verify tools and runtime defaults
        run: docker run --rm -v "$PWD/scripts:/tests:ro" aws-archi:test bash /tests/verify-tools.sh
      - name: Block fixable critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: aws-archi:test
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

  publish:
    name: Publish multi-architecture image
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ${{ env.IMAGE_DOCKERHUB }}
            ${{ env.IMAGE_GHCR }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
      - id: build
        name: Build and push signed-source image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: .devcontainer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=aws-archi
          cache-to: type=gha,mode=max,scope=aws-archi
          sbom: true
          provenance: mode=max
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1
      - name: Sign image manifests with GitHub OIDC
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE_DOCKERHUB}@${DIGEST}"
          cosign sign --yes "${IMAGE_GHCR}@${DIGEST}"
      - name: Synchronize Docker Hub overview
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: haonde/aws-archi
          readme-filepath: ./DOCKER_HUB_OVERVIEW.md
          short-description: Multi-architecture AWS and Infrastructure as Code development container
