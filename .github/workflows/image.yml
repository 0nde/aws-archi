name: Build and publish image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - ".github/workflows/image.yml"
      - ".devcontainer/Dockerfile"
      - ".dockerignore"
      - "scripts/**"
      - "tests/**"
      - "tooling/**"
      - "third_party_licenses/**"
      - "LICENSE"
      - "NOTICE"
      - "THIRD_PARTY_NOTICES.md"
      - "SOURCE_OFFER.md"
  # Keep this trigger unfiltered: the two validation contexts are required by
  # the main-branch ruleset and must be reported for every pull request.
  pull_request:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_DOCKERHUB: haonde/aws-archi
  IMAGE_GHCR: ghcr.io/0nde/aws-archi
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  validate:
    name: Validate image (${{ matrix.arch }})
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Test the maintenance updater
        run: python -m unittest discover -s tests -p "test_*.py"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build validation image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: .devcontainer/Dockerfile
          platforms: ${{ matrix.platform }}
          load: true
          push: false
          tags: aws-archi:test
          cache-from: type=gha,scope=aws-archi-${{ matrix.arch }}
          no-cache: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
      - name: Verify tools and runtime defaults
        run: docker run --rm -v "$PWD/scripts:/tests:ro" aws-archi:test bash /tests/verify-tools.sh
      - name: Block fixable critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: aws-archi:test
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

  publish-platform:
    name: Build, validate and stage platform (${{ matrix.arch }})
    if: >-
      github.event_name != 'pull_request' &&
      (github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Test the maintenance updater
        run: python -m unittest discover -s tests -p "test_*.py"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: platform-meta
        name: Generate OCI metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_GHCR }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,enable=${{ github.event_name == 'push' }}
          labels: |
            org.opencontainers.image.title=AWS Architecture Development Environment
            org.opencontainers.image.description=Hardened multi-architecture AWS and IaC development image with a verifiable supply chain
            org.opencontainers.image.documentation=https://github.com/0nde/aws-archi#readme
            org.opencontainers.image.vendor=0nde
            org.opencontainers.image.licenses=Apache-2.0
      - id: build
        name: Build and stage platform by digest
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: .devcontainer/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=${{ env.IMAGE_GHCR }}",push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.platform-meta.outputs.labels }}
          cache-from: type=gha,scope=aws-archi-${{ matrix.arch }}
          build-args: |
            RUNTIME_REFRESH=${{ github.run_id }}
          # Every publication refreshes the runtime packages without discarding
          # immutable Go build layers. Normal pushes retain the resulting cache.
          cache-to: ${{ github.event_name == 'push' && format('type=gha,mode=min,scope=aws-archi-{0}', matrix.arch) || '' }}
          sbom: true
          provenance: mode=max
      - name: Verify the exact staged platform image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          ref="${IMAGE_GHCR}@${DIGEST}"
          docker pull --platform "$PLATFORM" "$ref"
          docker run --rm --platform "$PLATFORM" \
            -v "$PWD/scripts:/tests:ro" \
            "$ref" bash /tests/verify-tools.sh
      - name: Block fixable critical vulnerabilities in the staged image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_GHCR }}@${{ steps.build.outputs.digest }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
      - name: Export platform digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - name: Upload platform digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-manifest:
    name: Publish multi-architecture manifest
    if: github.event_name != 'pull_request'
    needs: publish-platform
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ${{ env.IMAGE_DOCKERHUB }}
            ${{ env.IMAGE_GHCR }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,enable=${{ github.event_name == 'push' }}
      - id: manifest
        name: Create canonical GHCR manifest
        env:
          FINAL_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          mapfile -t digests < <(find /tmp/digests -maxdepth 1 -type f -printf '%f\n' | sort)
          if [ "${#digests[@]}" -ne 2 ]; then
            echo "Expected two platform digests, found ${#digests[@]}" >&2
            exit 1
          fi

          sources=()
          for digest in "${digests[@]}"; do
            sources+=("${IMAGE_GHCR}@sha256:${digest}")
          done

          tag_args=()
          ghcr_ref=""
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            case "$tag" in
              "${IMAGE_GHCR}:"*)
                tag_args+=(--tag "$tag")
                [ -n "$ghcr_ref" ] || ghcr_ref="$tag"
                ;;
            esac
          done <<< "$FINAL_TAGS"

          if [ -z "$ghcr_ref" ]; then
            echo "Metadata did not produce a GHCR tag" >&2
            exit 1
          fi

          docker buildx imagetools create \
            --metadata-file "$RUNNER_TEMP/manifest.json" \
            "${tag_args[@]}" "${sources[@]}"
          digest=$(jq -r '."containerimage.descriptor".digest' "$RUNNER_TEMP/manifest.json")
          test "$digest" != "null"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "ghcr_ref=$ghcr_ref" >> "$GITHUB_OUTPUT"
      - name: Read pinned tool versions
        id: versions
        shell: bash
        run: |
          source tooling/tool-versions.conf
          echo "cosign=${COSIGN_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v${{ steps.versions.outputs.cosign }}
      - name: Sign image manifests with GitHub OIDC
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: cosign sign --yes "${IMAGE_GHCR}@${DIGEST}"
    outputs:
      digest: ${{ steps.manifest.outputs.digest }}

  mirror-dockerhub:
    name: Mirror canonical image to Docker Hub
    needs: publish-manifest
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # GHCR is already published before this independent mirror is attempted.
    # A mirror failure remains visible without rolling back the canonical image.
    permissions:
      contents: read
      id-token: write
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to canonical GHCR registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_DOCKERHUB }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,enable=${{ github.event_name == 'push' }}
      - name: Copy the canonical index and attestations
        env:
          DIGEST: ${{ needs.publish-manifest.outputs.digest }}
          FINAL_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && tag_args+=(--tag "$tag")
          done <<< "$FINAL_TAGS"
          test "${#tag_args[@]}" -gt 0
          docker buildx imagetools create "${tag_args[@]}" "${IMAGE_GHCR}@${DIGEST}"
      - name: Read pinned tool versions
        id: versions
        shell: bash
        run: |
          source tooling/tool-versions.conf
          echo "cosign=${COSIGN_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v${{ steps.versions.outputs.cosign }}
      - name: Sign the Docker Hub mirror
        env:
          DIGEST: ${{ needs.publish-manifest.outputs.digest }}
        run: cosign sign --yes "${IMAGE_DOCKERHUB}@${DIGEST}"

  verify-publication:
    name: Verify published image
    if: always() && needs.publish-manifest.result == 'success'
    needs: [publish-manifest, mirror-dockerhub]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Read pinned tool versions
        id: versions
        shell: bash
        run: |
          source tooling/tool-versions.conf
          echo "cosign=${COSIGN_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v${{ steps.versions.outputs.cosign }}
      - name: Verify canonical publication and optional mirror
        env:
          EXPECTED_DIGEST: ${{ needs.publish-manifest.outputs.digest }}
          EXPECTED_REVISION: ${{ github.sha }}
          CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/image.yml@${{ github.ref }}
        run: |
          verify_image() {
            local ref="$1"
            local manifest sbom provenance image platform actual

            manifest=$(docker buildx imagetools inspect "$ref" --format '{{json .Manifest}}')
            actual=$(jq -r '.digest' <<< "$manifest")
            test "$actual" = "$EXPECTED_DIGEST"
            jq -e '([.manifests[] | select(.platform.os == "linux") | .platform.architecture] | sort) == ["amd64", "arm64"]' <<< "$manifest" >/dev/null

            for platform in linux/amd64 linux/arm64; do
              sbom=$(docker buildx imagetools inspect "$ref" --format "{{json (index .SBOM \"$platform\")}}")
              jq -e '.SPDX.spdxVersion and (.SPDX.packages | length > 0)' <<< "$sbom" >/dev/null

              provenance=$(docker buildx imagetools inspect "$ref" --format "{{json (index .Provenance \"$platform\")}}")
              jq -e '.SLSA.buildDefinition.buildType and .SLSA.runDetails.builder.id' <<< "$provenance" >/dev/null

              image=$(docker buildx imagetools inspect "$ref" --format "{{json (index .Image \"$platform\")}}")
              jq -e --arg revision "$EXPECTED_REVISION" \
                '.config.Labels["org.opencontainers.image.revision"] == $revision and
                 .config.Labels["org.opencontainers.image.source"] == "https://github.com/0nde/aws-archi" and
                 .config.Labels["org.opencontainers.image.licenses"] == "Apache-2.0"' \
                <<< "$image" >/dev/null
            done

            cosign verify "$ref" \
              --certificate-identity "$CERTIFICATE_IDENTITY" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com >/dev/null
          }

          verify_image "${IMAGE_GHCR}@${EXPECTED_DIGEST}"

          if docker buildx imagetools inspect "${IMAGE_DOCKERHUB}@${EXPECTED_DIGEST}" >/dev/null 2>&1; then
            verify_image "${IMAGE_DOCKERHUB}@${EXPECTED_DIGEST}"
            echo "Docker Hub and GHCR expose the same verified digest." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::GHCR is verified, but the Docker Hub mirror is unavailable. Re-run the workflow to retry the mirror."
            echo "Docker Hub mirror unavailable; GHCR publication verified successfully." >> "$GITHUB_STEP_SUMMARY"
          fi
