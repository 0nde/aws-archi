name: Synchronize Docker Hub overview

on:
  push:
    branches: [main]
    paths:
      - "DOCKER_HUB_OVERVIEW.md"
      - ".github/workflows/dockerhub-description.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dockerhub-description
  cancel-in-progress: true

jobs:
  synchronize:
    name: Synchronize Docker Hub overview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: haonde/aws-archi
          readme-filepath: ./DOCKER_HUB_OVERVIEW.md
          short-description: Multi-architecture AWS and Infrastructure as Code development container
