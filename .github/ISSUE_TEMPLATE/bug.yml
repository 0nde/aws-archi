name: Bug report
description: Report a reproducible problem with the development image.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private infrastructure details or unpatched vulnerability information.
  - type: input
    id: image
    attributes:
      label: Image reference
      description: Provide the tag or preferably the immutable digest.
      placeholder: haonde/aws-archi@sha256:...
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - linux/amd64
        - linux/arm64
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe what happened and what you expected.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the smallest safe reproduction without secrets.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      render: shell
